services:
  # Fix volume permissions on first run (volumes created as root)
  init:
    build: .
    user: root
    volumes:
      - claude-auth:/home/claude/.claude
    entrypoint: ["bash", "-c", "chown -R claude:claude /home/claude/.claude"]
    restart: "no"

  proxy:
    build: .
    user: "claude"
    depends_on:
      init:
        condition: service_completed_successfully
    ports:
      - "3456:3456"
    volumes:
      - claude-auth:/home/claude/.claude
    environment:
      - CLAUDE_PROXY_PASSTHROUGH=1
      - CLAUDE_PROXY_HOST=0.0.0.0
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:3456/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

volumes:
  claude-auth:
